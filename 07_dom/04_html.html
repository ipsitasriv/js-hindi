<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chai aur code|dom</title>
</head>
<body style="background-color:darkred ; color:antiquewhite;">
    <ul class="language">
        <li> Javascript</li>
        

    </ul>
</body>

<script>
function addLanguage(langName){

    const li=document.createElement('li')
    li.innerHTML=`${langName}`
    document.querySelector('.language').appendChild(li)
}
addLanguage('python')
addLanguage('typescript')


function addoplang(langname){
    const li=document.createElement('li')
    li.appendChild(document.createTextNode(langname))
    document.querySelector('.language').appendChild(li)//faster more optimised
}
addoplang('golang')

//edit

const li2=document.querySelector('li:nth-child(3  )')
//li2.innerHTML='Mojo'
const newli=document.createElement("li")
newli.textContent='mojo'
li2.replaceWith(newli)

const firstchild=document.querySelector("li:first-child")
firstchild.outerHTML="<li>Typescript</li>"

const lastlang=document.querySelector("li:last-child")
lastlang.remove()
</script>
</html>
